version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: perf-audit-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: perf-audit-backend
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    volumes:
      - sqlite_data:/usr/src/app/data
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: perf-audit-frontend
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:5000
    depends_on:
      - backend

volumes:
  sqlite_data:
